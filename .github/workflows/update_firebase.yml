name: Auto Update Firestore on Release
on:
  release:
    types: [published]

jobs:
  update-firestore:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Update Versioning Document
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          RELEASE_DATA: ${{ toJson(github.event.release) }}
        run: |
          npm install firebase-admin
          node -e "
          const admin = require('firebase-admin');
          try {
            const serviceAccount = JSON.parse(process.env.FIREBASE_SERVICE_ACCOUNT);
            const release = JSON.parse(process.env.RELEASE_DATA);
            
            admin.initializeApp({
              credential: admin.credential.cert(serviceAccount)
            });
            
            const db = admin.firestore();
            const apkAsset = release.assets.find(a => a.name.endsWith('.apk'));
            
            if (!apkAsset) {
              console.log('No APK found in release');
              process.exit(0);
            }

            const tag = release.tag_name;
            const buildNumber = tag.includes('+') ? tag.split('+')[1] : '1';
            const version = tag.split('+')[0].replace('v', '');

            db.collection('app_config').doc('versioning').set({
              latest_build_number: buildNumber,
              latest_version: version,
              download_url: apkAsset.browser_download_url
            }, { merge: true }).then(() => {
              console.log('Successfully updated Firestore!');
              process.exit(0);
            }).catch(err => {
              console.error('Firestore Error:', err.message);
              process.exit(1);
            });
          } catch (e) {
            console.error('Configuration Error:', e.message);
            process.exit(1);
          }
          "
